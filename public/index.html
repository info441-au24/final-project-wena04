<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Business Management Tool</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/stylesheets/style.css" />
    <script src="javascripts/businessInfo.js"></script>
    <script src="javascripts/index.js"></script>
    <script src="javascripts/utils.js"></script>
    <script src="javascripts/myIdentity.js"></script>
  </head>

  <body onload="init()">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="/">Business Management Tool</a>
        <div id="identity_div" class="ms-auto">Loading user identity...</div>
      </div>
    </nav>

    <div class="container mt-4">
      <h1 class="mb-4">Welcome to the Business Management Tool</h1>
      <div class="mb-4">
        <h3>Add a Business</h3>
        <div class="mb-3">
          <label for="business_name_input" class="form-label"
            >Business Name:</label
          >
          <input
            id="business_name_input"
            type="text"
            class="form-control"
            placeholder="Enter business name"
          />
        </div>
        <button class="btn btn-primary" onclick="addBusiness()">
          Add Business
        </button>
        <span id="postStatus" class="ms-2"></span>
      </div>

      <h4>Your Businesses:</h4>
      <div id="business_results" class="row"></div>
    </div>
  </body>
</html>
